# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI/CD Workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 1. Start at 5:45 AM Sri Lanka (00:15 UTC)
    - cron: '15 0 * * *'
    
    # 2. Restart at 11:45 AM Sri Lanka (06:15 UTC)
    - cron: '15 6 * * *'
    
    # 3. Restart at 5:45 PM Sri Lanka (12:15 UTC)
    - cron: '15 12 * * *'
    
    # 4. Final leg starts at 11:45 PM SL (18:15 UTC)
    - cron: '15 18 * * *'
  
  workflow_dispatch: # Keep this so you can start it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install



    - name: Start application
      run: npm start
